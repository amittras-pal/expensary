# This file was auto-generated by the Firebase CLI
# https://github.com/firebase/firebase-tools

name: Deploy to Firebase Hosting on merge
'on':
  push:
    branches:
      - main
jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    env:
      VITE_API_BASE_URL: "${{ secrets.VITE_API_BASE_URL }}"
      VITE_APP_TITLE: "${{ secrets.VITE_APP_TITLE }}"
    steps:
      - uses: actions/checkout@v6
      - run: npm i && npm run build
      - id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: '${{ secrets.FIREBASE_SERVICE_ACCOUNT_EXPENSARY }}'

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Deploy to Live
        run: |
          set +e
          OUTPUT=$(firebase deploy --only hosting --project expensary --json 2>&1)
          EXIT_CODE=$?
          set -e
          echo "$OUTPUT"
          
          if [ $EXIT_CODE -ne 0 ]; then
            if echo "$OUTPUT" | grep -q "is the current active version"; then
              echo "Deployment succeeded! Ignoring Firebase CLI retry bug."
              exit 0
            else
              exit $EXIT_CODE
            fi
          fi
